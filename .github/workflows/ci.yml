name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Format check
        run: make fmt-check

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build with Keychain support
        run: CGO_ENABLED=1 go build -o bin/yuki ./cmd/yuki

      - name: Test binary
        run: ./bin/yuki version
